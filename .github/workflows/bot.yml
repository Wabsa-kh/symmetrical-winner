name: 📺 Long Form Bot

on:
  schedule:
    - cron: '0 */10 * * *' # Every 6 hours
  workflow_dispatch:      # Manual trigger

concurrency: 
  group: youtube-db-sync
  cancel-in-progress: false

jobs:
  run-long:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools (Deno, FFmpeg, Tor)
        run: |
          curl -fsSL https://deno.land/x/install/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          sudo apt-get update && sudo apt-get install -y ffmpeg tor
          sudo service tor start

      - name: Install Deps
        run: pip install -r project/requirements.txt

      - name: Run Long Bot
        working-directory: project
        env:
          BOT_TOKENS: ${{ secrets.BOT_TOKENS }}
        run: python main.py --mode long

      - name: Save State
        run: |
          git config --global user.name "YouTube-Bot"
          git config --global user.email "bot@github.actions"
          # Pull remote first so we never overwrite a concurrent bot commit
          git stash -u || true
          git pull --rebase origin main || true
          git stash pop || true
          git add project/database.json project/config.json
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Sync Long State [skip ci]"
            git push origin main
          fi
